AWSTemplateFormatVersion: '2010-09-09'
Description: Ubuntu Cafe & Lounge — Create Order (POST /orders)

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: API Gateway stage name

Resources:

  # --------------------------------------------------------------------------
  # DynamoDB
  # --------------------------------------------------------------------------
  OrderTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: orderData
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # --------------------------------------------------------------------------
  # IAM
  # --------------------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBWriteAndSESSend
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              - Effect: Allow
                Action: 
                  - dynamodb:PutItem
                Resource: !GetAtt OrderTable.Arn

              - Effect: Allow
                Action: 
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  # --------------------------------------------------------------------------
  # Lambda
  # --------------------------------------------------------------------------
  CreateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ubuntu-cafe-create-order
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import uuid
          import os
          import boto3
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def build_response(status_code, body):
              return {
                  'statusCode': status_code,
                  'body': json.dumps(body),
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*'
                  }
              }

          def handler(event, context):
              try:
                  body = json.loads(event.get('body', ''))
              except (json.JSONDecodeError, TypeError):
                  return build_response(400, {'message': 'Invalid JSON in request body'})

              customer = body.get('customer')
              items = body.get('items')

              if not customer or not isinstance(items, list) or len(items) == 0:
                  return build_response(400, {
                      'message': 'customer object and a non-empty items array are required'
                  })

              if not customer.get('name') or not customer.get('phone'):
                  return build_response(400, {
                      'message': 'customer name and phone are required'
                  })

              subtotal = 0
              for item in items:
                  if not all(k in item for k in ('id', 'name', 'price', 'quantity')):
                      return build_response(400, {
                          'message': 'Each item must have id, name, price, and quantity'
                      })
                  if not isinstance(item['price'], (int, float)) or item['price'] < 0:
                      return build_response(400, {
                          'message': f"Invalid price for item '{item.get('id')}'"
                      })
                  if not isinstance(item['quantity'], int) or item['quantity'] <= 0:
                      return build_response(400, {
                          'message': f"Invalid quantity for item '{item.get('id')}'"
                      })
                  subtotal += item['price'] * item['quantity']

              order = {
                  'orderId': f"ORD-{uuid.uuid4().hex[:8].upper()}",
                  'customer': customer,
                  'items': items,
                  'subtotal': subtotal,
                  'fulfillment': body.get('fulfillment', {'type': 'pickup'}),
                  'status': 'Pending',
                  'receivedAt': datetime.now(timezone.utc).isoformat()
              }

              try:
                  table.put_item(Item=order)
              except Exception as e:
                  print(f"DynamoDB put_item failed: {e}")
                  return build_response(500, {'message': 'Failed to save order'})

              return build_response(201, {
                  'orderId': order['orderId'],
                  'status': order['status'],
                  'subtotal': order['subtotal'],
                  'receivedAt': order['receivedAt'],
                  'message': 'Order received successfully'
              })
      Environment:
        Variables:
          TABLE_NAME: !Ref OrderTable

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateOrderFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrdersApi}/*/POST/orders

  # --------------------------------------------------------------------------
  # API Gateway (REST)
  # --------------------------------------------------------------------------
  OrdersApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: UbuntuCafeOrders
      Description: Ubuntu Cafe & Lounge — order API
      EndpointConfiguration:
        Types:
          - REGIONAL

  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrdersApi
      ParentId: !GetAtt OrdersApi.RootResourceId
      PathPart: orders

  CreateOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrdersApi
      ResourceId: !Ref OrdersResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateOrderFunction.Arn}/invocations
      MethodResponses:
        - StatusCode: 201
        - StatusCode: 400
        - StatusCode: 500

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: CreateOrderMethod
    Properties:
      RestApiId: !Ref OrdersApi
      StageName: !Ref StageName

Outputs:
  ApiUrl:
    Description: Base URL for the Ubuntu Cafe Orders API
    Value: !Sub https://${OrdersApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  OrderTableName:
    Description: DynamoDB table name
    Value: !Ref OrderTable
  CreateOrderFunctionArn:
    Description: CreateOrder Lambda function ARN
    Value: !GetAtt CreateOrderFunction.Arn
